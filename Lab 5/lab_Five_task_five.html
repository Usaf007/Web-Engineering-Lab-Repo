<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 5 - Task 5: Display Selected Text</title>
</head>
<body>
    <h3>Display of selected Text using onSelect Event</h3>
    
    Select Text 
    <input type="text" id="myText" value="Select Text" onSelect="displaySelected();">
    
    <div id="outputDiv" style="background-color: cyan; width: 200px; height: 200px; margin-top: 10px; text-align: center; font-weight: bold; font-size: 24px; padding-top: 10px;">
    </div>
    <script src="script.js"></script>
</body>
</html>
