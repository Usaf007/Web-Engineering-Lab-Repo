<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 5 - Task 4: Form Validation</title>
</head>
<body>
    <h2>Sign Up Form (JavaScript Validation)</h2>
    
    <form action="" method="post" onSubmit="return validation();">
        <table>
            <tr>
                <td>Name:</td>
                <td>
                    <input type="text" name="name" id="name">
                    <span id="nameErr" style="color:red;"></span>
                </td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" value="male" checked>Male <br>
                    <input type="radio" name="gender" value="female">Female
                </td>
            </tr>
            <tr>
                <td>Email:</td>
                <td>
                    <input type="text" name="email" id="email">
                    <span id="emailErr" style="color:red;"></span>
                </td>
            </tr>
            <tr>
                <td>Address:</td>
                <td>
                    <textarea name="add" id="add"></textarea>
                    <span id="addErr" style="color:red;"></span>
                </td>
            </tr>
            <tr>
                <td>Login ID:</td>
                <td>
                    <input type="text" name="login" id="login">
                    <span id="loginErr" style="color:red;"></span>
                </td>
            </tr>
            <tr>
                <td>Password:</td>
                <td>
                    <input type="password" name="pass" id="pass">
                    <span id="passErr" style="color:red;"></span>
                </td>
            </tr>
            <tr>
                <td>Agreed with<br>Policy:</td>
                <td>
                    <input type="checkbox" name="agree" id="chk">
                    <span id="chkErr" style="color:red;"></span>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Submit">&nbsp;&nbsp;&nbsp;
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>

    <script src="script.js"></script>
</body>
</html>
