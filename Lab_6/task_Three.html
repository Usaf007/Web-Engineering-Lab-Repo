<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 6 - Task 3 : Traditional vs. Arrow Function</title>
</head>
<body>
    <div id="output"></div>

    <script>
        // 1. Traditional function
        function add(a, b) {
            return a + b;
        }
        console.log("Traditional Function Output: ", add(2, 3)); // Output: 5
        document.getElementById("output").innerHTML += "Traditional Function Output: " + add(2, 3) + "<br>";

        // 2. Arrow function conversion
        const addArrow = (a, b) => a + b;
        
        console.log("Arrow Function Output: ", addArrow(2, 3)); // Output: 5
        document.getElementById("output").innerHTML += "Arrow Function Output: " + addArrow(2, 3);
    </script>
</body>
</html>
